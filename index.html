const TH = {
  hySpread:   {normal:400, warning:500, trigger:600},
  igCds:      {normal:70,  warning:90},
  sovCds:     {normal:40,  warning:70,  trigger:80},

  yieldCurve: {normal:-0.5,warning:-0.1},

  vix:        {normal:20,  warning:30,  trigger:40},

  oil:        {normal:90,  warning:110, trigger:130},
  dxy:        {normal:98,  warning:102},
  kre:        {normal:-3,  warning:-5,  trigger:-10},
};

function getStatus(val, id) {
  if (val == null) return "loading";
  const t = TH[id];
  if (!t) return "normal";
  if (id === "yieldCurve") {
    if (val < t.normal) return "normal";
    if (val < t.warning) return "warning";
    return "trigger";
  }
  if (id === "kre") {
    if (val > t.normal) return "normal";
    if (val > t.warning) return "warning";
    if (val > t.trigger) return "trigger";
    return "crisis";
  }
  if (t.crisis && val > t.crisis) return "crisis";
  if (t.trigger && val > t.trigger) return "trigger";
  if (t.warning && val > t.warning) return "warning";
  return "normal";
}

// ─── API FETCH FUNCTIONS ────────────────────────────────────────────
// FRED API (St. Louis Fed) — https://api.stlouisfed.org
// Get your free key at: https://fred.stlouisfed.org/docs/api/api_key.html
async function fetchFRED(seriesId, apiKey) {
  if (!apiKey) return null;
  try {
    const url = "https://api.stlouisfed.org/fred/series/observations?series_id="
      + seriesId + "&api_key=" + apiKey
      + "&file_type=json&sort_order=desc&limit=60";
    const res = await fetch(url);
    if (!res.ok) throw new Error("FRED " + res.status);
    const json = await res.json();
    const obs = (json.observations || []).filter(o => o.value !== ".").slice(0, 30);
    if (!obs.length) return null;
    const values = obs.map(o => parseFloat(o.value)).reverse();
    const cur = values[values.length - 1];
    const prev = values.length > 1 ? values[values.length - 2] : cur;
    return {value: cur, change: Math.round((cur - prev) * 100) / 100, spark: values};
  } catch (e) { console.warn("FRED fetch error (" + seriesId + "):", e); return null; }
}

// Finnhub API — https://finnhub.io
// Get your free key at: https://finnhub.io/register
async function fetchFinnhub(symbol, apiKey) {
  if (!apiKey) return null;
  try {
    const url = "https://finnhub.io/api/v1/quote?symbol=" + symbol + "&token=" + apiKey;
    const res = await fetch(url);
    if (!res.ok) throw new Error("Finnhub " + res.status);
    const json = await res.json();
    if (!json.c) return null;
    return {value: json.c, change: Math.round(json.d * 100) / 100};
  } catch (e) { console.warn("Finnhub fetch error (" + symbol + "):", e); return null; }
}

// ─── SPARKLINE (Canvas) ─────────────────────────────────────────────
function Sparkline({data, width=120, height=32, color=C.gold}) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !data || data.length < 2) return;
    const cvs = ref.current;
    const dpr = window.devicePixelRatio || 1;
    cvs.width = width * dpr; cvs.height = height * dpr;
    cvs.style.width = width + "px"; cvs.style.height = height + "px";
    const ctx = cvs.getContext("2d"); ctx.scale(dpr, dpr);
    const min = Math.min(...data), max = Math.max(...data);
    const range = max - min || 1;
    const px = (i) => (i / (data.length - 1)) * width;
    const py = (v) => height - 2 - ((v - min) / range) * (height - 4);
    // fill
    ctx.beginPath(); ctx.moveTo(0, height);
    data.forEach((v, i) => ctx.lineTo(px(i), py(v)));
    ctx.lineTo(width, height); ctx.closePath();
    ctx.fillStyle = color + "0a"; ctx.fill();
    // line
    ctx.beginPath(); data.forEach((v, i) => i === 0 ? ctx.moveTo(px(i), py(v)) : ctx.lineTo(px(i), py(v)));
    ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.lineJoin = "round"; ctx.stroke();
  }, [data, width, height, color]);
  if (!data || data.length < 2) return React.createElement("div", {style:{width, height, background:C.navyLight, opacity:0.3}});
  return React.createElement("canvas", {ref, style:{display:"block"}});
}

function goldSignal(data) {
  if (!data?.realYield || !data?.us10y) return "NEUTRAL";

  if (data.realYield.change > 0 && data.us10y.change > 0) return "WEAK";
  return "NEUTRAL";
}

    {id:"yieldCurve", label:"Yield Curve (2Y\u201310Y)", subtitle:"FRED: T10Y2Y"},
    {id:"realYield",  label:"Real Yield (10Y TIPS)", subtitle:"FRED: DFII10"},
  ]},
  {section:"Volatility / Stress", number:"3", items:[
    {id:"move", label:"MOVE Index", subtitle:"Bond market volatility"},
    {id:"vix",  label:"VIX", subtitle:"S&P 500 implied volatility"},
    {id:"ovx",  label:"OVX (Oil Volatility)", subtitle:"Crude oil implied volatility"},
  ]},
  {section:"Commodities / Inflation", number:"4", items:[
    {id:"oil",        label:"Oil (Brent)", subtitle:"Global benchmark crude"},
    {id:"gold",       label:"Gold", subtitle:null},
    {id:"copperGold", label:"Copper / Gold Ratio", subtitle:"% change over rolling window"},
  ]},
  {section:"Currency / Capital Flows", number:"5", items:[
    {id:"dxy", label:"DXY (Dollar Index)", subtitle:"US Dollar strength"},
  ]},
  {section:"Banking / System Stress", number:"6", items:[
    {id:"kre", label:"KRE (Regional Banks)", subtitle:"SPDR S&P Regional Banking ETF"},
  ]},
];

const MINIMAL_IDS = ["hySpread","us10y","move","oil","vix","kre"];

// ─── MAIN APP ───────────────────────────────────────────────────────
function App() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [minimal, setMinimal] = useState(false);
  const [autoRefresh, setAutoRefresh] = useState(false);
  const intervalRef = useRef(null);

  const [apiKeys, setApiKeys] = useState(() => {
    try { const s = localStorage.getItem("aic_macro_keys"); return s ? JSON.parse(s) : {fred:"",finnhub:""}; }
    catch(e) { return {fred:"",finnhub:""}; }
  });

  const saveKeys = useCallback((keys) => {
    setApiKeys(keys);
    try { localStorage.setItem("aic_macro_keys", JSON.stringify(keys)); } catch(e) {}
  }, []);

  const fetchAll = useCallback(async () => {
    setLoading(true);
    let result = makeDemoData();

    // ── FRED fetches ──
    if (apiKeys.fred) {
      const series = [
        {id:"hySpread",   series:"BAMLH0A0HYM2", unit:"bps"},
        {id:"us10y",      series:"DGS10",         unit:"%"},
        {id:"yieldCurve", series:"T10Y2Y",        unit:"%"},
        {id:"realYield",  series:"DFII10",        unit:"%"},
      ];
      await Promise.allSettled(series.map(async (s) => {
        const d = await fetchFRED(s.series, apiKeys.fred);
        if (d) result[s.id] = {...result[s.id], ...d, unit:s.unit};
      }));
    }

    // ── Finnhub fetches ──
    if (apiKeys.finnhub) {
      const symbols = [
        {id:"vix",  symbol:"CBOE:VIX"},
        {id:"oil",  symbol:"OANDA:BCO_USD"},
        {id:"gold", symbol:"OANDA:XAU_USD"},
        {id:"dxy",  symbol:"TVC:DXY"},
        {id:"kre",  symbol:"KRE"},
      ];
      await Promise.allSettled(symbols.map(async (s) => {
        const d = await fetchFinnhub(s.symbol, apiKeys.finnhub);
        if (d) result[s.id] = {...result[s.id], value:d.value, change:d.change};
      }));
    }

    setData(result);
    setLastUpdated(new Date());
    setLoading(false);
  }, [apiKeys]);

  useEffect(() => { fetchAll(); }, [fetchAll]);

  useEffect(() => {
    if (autoRefresh) { intervalRef.current = setInterval(fetchAll, 60000); }
    return () => { if (intervalRef.current) clearInterval(intervalRef.current); };
  }, [autoRefresh, fetchAll]);

  const gSig = goldSignal(data);
  const hasKeys = apiKeys.fred || apiKeys.finnhub;

  // ─── NAV ──────────────────────────────────────────────────────────
  const Nav = () => React.createElement("div", null,
    React.createElement("div", {style:{
      background:C.navy, padding:"14px 0", borderBottom:"1px solid "+C.border,
    }},
      React.createElement("div", {style:{
        maxWidth:"1100px", margin:"0 auto", padding:"0 24px",
        display:"flex", justifyContent:"space-between", alignItems:"center",
        flexWrap:"wrap", gap:"10px",
      }},
        // Logo
        React.createElement("div", {style:{
          fontFamily:"var(--font-display)", fontSize:"1.35rem", fontWeight:500,
          letterSpacing:"0.06em", color:C.white,
        }},
          "AGENTIC ", React.createElement("span", {style:{color:C.gold}}, "INSIGHT CAPITAL")
        ),
        // Right side controls
        React.createElement("div", {style:{display:"flex", alignItems:"center", gap:"14px", flexWrap:"wrap"}},
          lastUpdated && React.createElement("span", {style:{
            fontSize:"0.6rem", color:C.slate+"88", letterSpacing:"0.06em",
          }}, "Updated " + lastUpdated.toLocaleTimeString()),
          React.createElement(Toggle, {checked:minimal, onChange:()=>setMinimal(!minimal), label:"Minimal"}),
          React.createElement(Toggle, {checked:autoRefresh, onChange:()=>setAutoRefresh(!autoRefresh), label:"Auto-refresh"}),
          React.createElement("button", {onClick:()=>setSettingsOpen(true), style:{
            background:"transparent", border:"1px solid "+C.border,
            padding:"6px 12px", color:C.slateLight, cursor:"pointer",
            fontFamily:"var(--font-body)", fontSize:"0.62rem", letterSpacing:"0.1em",
          }}, "\u2699 SETTINGS"),
          React.createElement("button", {onClick:fetchAll, disabled:loading, style:{
            background:C.gold, border:"none", padding:"6px 14px",
            color:C.navy, cursor:"pointer", fontFamily:"var(--font-body)",
            fontSize:"0.62rem", fontWeight:600, letterSpacing:"0.1em",
            opacity: loading ? 0.5 : 1,
          }}, "\u21BB REFRESH")
        )
      )
    ),
    React.createElement("div", {style:{
      height:"1px", background:"linear-gradient(90deg, transparent, rgba(184,151,58,0.25), transparent)",
    }})
  );

  // ─── FOOTER ───────────────────────────────────────────────────────
  const Footer = () => React.createElement("div", null,
    React.createElement("div", {style:{
      height:"1px", background:"linear-gradient(90deg, transparent, rgba(184,151,58,0.25), transparent)",
    }}),
    React.createElement("div", {style:{padding:"24px 0", textAlign:"center"}},
      React.createElement("div", {style:{
        fontFamily:"var(--font-display)", fontSize:"1rem", fontWeight:500,
        letterSpacing:"0.06em", color:C.white, marginBottom:"4px",
      }}, "AGENTIC ", React.createElement("span", {style:{color:C.gold}}, "INSIGHT CAPITAL")),
      React.createElement("p", {style:{color:C.slate, fontSize:"0.72rem", marginBottom:"4px"}}, "Vancouver, Canada"),
      React.createElement("p", {style:{
        color:C.slate, fontSize:"0.62rem", lineHeight:1.7, maxWidth:"600px", margin:"8px auto 0",
      }}, "Data sources: FRED (St. Louis Fed) \u00B7 Finnhub \u00B7 Market data delayed \u226515 min. For informational purposes only \u2014 not investment advice."),
      React.createElement("p", {style:{
        color:"rgba(136,153,176,0.5)", fontSize:"0.6rem", marginTop:"8px",
      }}, "\u00A9 " + new Date().getFullYear() + " Agentic Insight Capital. All rights reserved.")
    )
  );

  // ─── RENDER ───────────────────────────────────────────────────────
  return React.createElement("div", {style:{minHeight:"100vh", background:C.navy, color:C.white, fontFamily:"var(--font-body)"}},
    React.createElement(Nav),

    // Hero header
    React.createElement("div", {style:{
      background:C.navyMid, padding:"28px 24px", borderBottom:"1px solid "+C.border,
    }},
      React.createElement("div", {style:{maxWidth:"1100px", margin:"0 auto", display:"flex", justifyContent:"space-between", alignItems:"baseline", flexWrap:"wrap", gap:"12px"}},
        React.createElement("div", null,
          React.createElement("div", {style:{color:C.gold, fontSize:"0.6rem", letterSpacing:"0.25em", fontWeight:600, marginBottom:"6px"}}, "MACRO SURVEILLANCE"),
          React.createElement("h1", {style:{
            fontSize:"clamp(1.4rem,3vw,1.8rem)", color:C.white, margin:0, fontWeight:400,
            fontFamily:"var(--font-display)",
          }}, "Core Macro Risk Monitor")
        ),
        !hasKeys && React.createElement("div", {style:{
          display:"inline-flex", alignItems:"center", gap:"6px",
          padding:"6px 14px", background:C.amber+"10", border:"1px solid "+C.amber+"33",
        }},
          React.createElement("span", {style:{fontSize:"0.7rem"}}, "\u26A0"),
          React.createElement("span", {style:{fontSize:"0.62rem", color:C.amber}},
            "Demo data \u2014 open Settings to connect APIs"
          )
        )
      )
    ),

    // Content
    React.createElement("div", {style:{maxWidth:"1100px", margin:"0 auto", padding:"0 24px 48px"}},
      SECTIONS.map(sec => {
        const items = minimal ? sec.items.filter(it => MINIMAL_IDS.includes(it.id)) : sec.items;
        if (items.length === 0) return null;
        return React.createElement("div", {key:sec.section},
          React.createElement(SectionHeader, {title:sec.section, number:sec.number}),
          React.createElement("div", {style:{
            display:"grid",
            gridTemplateColumns:"repeat(auto-fill, minmax(280px, 1fr))",
            gap:"1px", background:C.border,
          }},
            items.map(it => {
              const d = data?.[it.id];
              let sub = it.subtitle;
              if (it.id === "gold") {
                sub = "Signal: " + gSig + " \u2014 " + (gSig==="STRONG" ? "Yields falling" : gSig==="WEAK" ? "Yields rising" : "Neutral");
              }
              return React.createElement(Card, {
                key:it.id, id:it.id, label:it.label, subtitle:sub,
                value:d?.value, change:d?.change, unit:d?.unit||"",
                sparkData:d?.spark,
              });
            })
          )
        );
      }),
      !minimal && React.createElement(OptionalSection),
      React.createElement(MasterConditions, {data})
    ),

    React.createElement(Footer),
    React.createElement(SettingsModal, {
      open:settingsOpen, onClose:()=>setSettingsOpen(false),
      keys:apiKeys, onSave:saveKeys,
    })
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
